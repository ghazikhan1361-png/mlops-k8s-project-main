apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-model-deployment
  namespace: mlops
  labels:
    app: mlops-model
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mlops-model
  template:
    metadata:
      labels:
        app: mlops-model
    spec:
      containers:
      - name: mlops-container
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mlops-service
  namespace: mlops
spec:
  selector:
    app: mlops-model
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
